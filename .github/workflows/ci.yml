name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all services
        run: |
          npx nest build chat-service
          npx nest build image-service
          npx nest build event-service
          npx nest build api-gateway

      - name: Verify build outputs
        run: |
          test -f dist/apps/chat-service/apps/chat-service/src/main.js
          test -f dist/apps/image-service/apps/image-service/src/main.js
          test -f dist/apps/event-service/main.js
          test -f dist/apps/api-gateway/apps/api-gateway/src/main.js
          echo "✅ All 4 services built successfully"
