# ============================================================
# Docker Compose — 로컬 개발 환경
#
# 서비스 구성:
# - api-gateway:    포트 3000 (HTTP/WebSocket)
# - chat-service:   포트 50051 (gRPC)
# - image-service:  포트 50052 (gRPC)
# - event-service:  포트 3002 (HTTP 내부)
# - redis:          포트 6379
# - postgres:       포트 5432
#
# Phase 2 추가 예정:
# - kafka + zookeeper
# - payment-service (Spring Boot)
# ============================================================

version: '3.8'

services:
  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVICE: api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - GATEWAY_PORT=3000
      - CHAT_SERVICE_URL=chat-service:50051
      - IMAGE_SERVICE_URL=image-service:50052
      - JWT_SECRET=dev-secret-do-not-use-in-prod
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=aichat
      - DB_PASSWORD=aichat_dev
      - DB_DATABASE=ai_character_chat
    depends_on:
      - chat-service
      - image-service
      - postgres
    networks:
      - app-network

  chat-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVICE: chat-service
    ports:
      - "50051:50051"
    environment:
      - NODE_ENV=development
      - CHAT_SERVICE_URL=0.0.0.0:50051
      - LLM_PRIMARY_MODEL=gemini-2.5-pro
      - LLM_FALLBACK_MODEL=claude-sonnet-4-6
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=aichat
      - DB_PASSWORD=aichat_dev
      - DB_DATABASE=ai_character_chat
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  image-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVICE: image-service
    ports:
      - "50052:50052"
    environment:
      - NODE_ENV=development
      - IMAGE_SERVICE_URL=0.0.0.0:50052
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=aichat
      - DB_PASSWORD=aichat_dev
      - DB_DATABASE=ai_character_chat
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  event-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SERVICE: event-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - EVENT_SERVICE_PORT=3002
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=aichat
      - DB_PASSWORD=aichat_dev
      - DB_DATABASE=ai_character_chat
    depends_on:
      - postgres
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=aichat
      - POSTGRES_PASSWORD=aichat_dev
      - POSTGRES_DB=ai_character_chat
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  # ── Phase 2: Kafka (payment-service 연동 시 활성화) ──────
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.5.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #   networks:
  #     - app-network

  # kafka:
  #   image: confluentinc/cp-kafka:7.5.0
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #   depends_on:
  #     - zookeeper
  #   networks:
  #     - app-network

volumes:
  redis-data:
  postgres-data:

networks:
  app-network:
    driver: bridge
