[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build:gateway && npm run build:chat"

[deploy]
startCommand = "node scripts/start-railway.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
